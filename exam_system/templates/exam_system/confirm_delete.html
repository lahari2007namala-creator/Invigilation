{% extends 'exam_system/base.html' %}
{% block title %}Confirm Delete{% endblock %}
{% block page_title %}Confirm Delete{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="card" style="border-top: 4px solid #ef4444;">
            <div class="card-body p-4 text-center">
                <div style="width:70px;height:70px;background:#fee2e2;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;">
                    <i class="bi bi-trash3-fill text-danger fs-2"></i>
                </div>
                <h5 style="font-weight:800; color:#1e1b4b;">Delete {{ type }}</h5>
                <p style="color:#6b7280; font-size:14px;">Are you sure you want to delete <strong>{{ obj }}</strong>? This action cannot be undone.</p>
                <form method="post" class="d-flex gap-2 justify-content-center mt-4">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger px-4"><i class="bi bi-trash me-2"></i>Yes, Delete</button>
                    <a href="javascript:history.back()" class="btn btn-secondary px-4">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
